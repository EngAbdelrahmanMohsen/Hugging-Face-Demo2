name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Hugging Face Hub
        uses: huggingface/hub-action@v1
        with:
          target_repo_id: abdelrahmanmohsen/Demo1
          target_repo_type: space
          token: ${{ secrets.SG }}
          git_user_name: github-actions
          git_user_email: github-actions@github.com
