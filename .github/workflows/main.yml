name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Add remote
        env:
          HF: ${{ secrets.SG }}
        run: git remote add space https://abdelrahmanmohsen:$HF@huggingface.co/spaces/abdelrahmanmohsen/Demo1
      - name: Push to hub
        env:
          HF: ${{ secrets.HF }}
        run: git push --force space main
